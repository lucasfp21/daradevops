apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet

metadata:
  name: apps
  namespace: argocd

spec:
  generators:
    - git:
        repoURL: https://github.com/lucasfp21/daradevops.git
        revision: HEAD

        directories:
          - path: apps/*
          - path: platform/*

  template:
    metadata:
      name: '{{path.basename}}'

    spec:
      project: default

      source:
        repoURL: https://github.com/lucasfp21/daradevops.git
        targetRevision: HEAD
        path: '{{path}}/k8s'

      destination:
        server: https://kubernetes.default.svc
        namespace: links

      syncPolicy:
        automated:
          prune: true
          selfHeal: true

        syncOptions:
          - CreateNamespace=true