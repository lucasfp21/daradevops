apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet

metadata:
  name: platform
  namespace: argocd

spec:
  generators:
    - git:
        repoURL: https://github.com/lucasfp21/daradevops.git
        revision: HEAD

        files:
          - path: "platform/**/app.yaml"

  template:
    metadata:
      name: '{{path.basenameNormalized}}'

    spec:
      project: default

      source:
        repoURL: https://github.com/lucasfp21/daradevops.git
        targetRevision: HEAD
        path: '{{path.path}}'

      destination:
        server: https://kubernetes.default.svc
        namespace: argocd

      syncPolicy:
        automated:
          prune: true
          selfHeal: true