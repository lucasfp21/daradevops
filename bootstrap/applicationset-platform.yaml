apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet

metadata:
  name: platform
  namespace: argocd

spec:
  generators:
    - git:
        repoURL: https://github.com/lucasfp21/daradevops.git
        revision: HEAD

        directories:
          - path: platform/*/application

  template:
    metadata:
      name: '{{path[1]}}'

    spec:
      project: default

      source:
        repoURL: https://github.com/lucasfp21/daradevops.git
        targetRevision: HEAD
        path: '{{path}}'

      destination:
        server: https://kubernetes.default.svc
        namespace: argocd

      syncPolicy:
        automated:
          prune: true
          selfHeal: true